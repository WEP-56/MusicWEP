name: flutter_app
description: "MusicWEP Flutter workspace."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.6
  desktop_multi_window: ^0.3.0
  file_picker: ^10.3.2
  flutter_js: ^0.8.4
  flutter_riverpod: ^2.6.1
  go_router: ^16.3.0
  html: ^0.15.6
  http: ^1.5.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  package_info_plus: ^9.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  pointycastle: ^3.9.1
  pub_semver: ^2.2.0
  window_manager: ^0.5.1
  xml: ^6.6.1
  tray_manager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - windows/runner/resources/app_icon.ico
